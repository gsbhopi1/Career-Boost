<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerBoost - Login</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBioGMOBU-lWGychndu1wBVfc-zuk5y3VU",
      authDomain: "careerboost-login-auth.firebaseapp.com",
      projectId: "careerboost-login-auth",
      storageBucket: "careerboost-login-auth.firebasestorage.app",
      messagingSenderId: "399076552033",
      appId: "1:399076552033:web:4edbbb119372ba5ae2a920",
      measurementId: "G-3GX36PS1D8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // If already logged in, go straight to home
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "home.html";
    });

    // Show/hide error
    function showError(msg) {
      const el = document.getElementById("authError");
      el.textContent = msg;
      el.style.display = "block";
    }
    function clearError() {
      const el = document.getElementById("authError");
      el.textContent = "";
      el.style.display = "none";
    }

    // Button loading state
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.disabled = loading;
      btn.textContent = loading ? "Please wait..." : btn.dataset.label;
    }

    // Friendly error messages
    function friendlyError(code) {
      switch (code) {
        case "auth/user-not-found":       return "No account found with this email.";
        case "auth/wrong-password":       return "Incorrect password. Try again.";
        case "auth/invalid-credential":   return "Invalid email or password.";
        case "auth/email-already-in-use": return "This email is already registered. Try logging in.";
        case "auth/invalid-email":        return "Please enter a valid email address.";
        case "auth/weak-password":        return "Password should be at least 6 characters.";
        case "auth/popup-closed-by-user": return "Google sign-in was cancelled.";
        default:                          return "Something went wrong. Please try again.";
      }
    }

    // Wait for DOM then attach all listeners
    document.addEventListener("DOMContentLoaded", () => {

      // ── Login ──
      document.getElementById("loginBtn").addEventListener("click", async () => {
        clearError();
        const email    = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!email || !password) return showError("Please fill in all fields.");
        setLoading("loginBtn", true);
        try {
          await signInWithEmailAndPassword(auth, email, password);
        } catch (err) {
          showError(friendlyError(err.code));
          setLoading("loginBtn", false);
        }
      });

      // ── Signup ──
      document.getElementById("signupBtn").addEventListener("click", async () => {
        clearError();
        const name     = document.getElementById("signupName").value.trim();
        const email    = document.getElementById("signupEmail").value.trim();
        const password = document.getElementById("signupPassword").value;
        if (!name || !email || !password) return showError("Please fill in all fields.");
        if (password.length < 6) return showError("Password must be at least 6 characters.");
        setLoading("signupBtn", true);
        try {
          await createUserWithEmailAndPassword(auth, email, password);
        } catch (err) {
          showError(friendlyError(err.code));
          setLoading("signupBtn", false);
        }
      });

      // ── Google ──
      document.getElementById("googleBtn").addEventListener("click", async () => {
        clearError();
        try {
          await signInWithPopup(auth, provider);
        } catch (err) {
          showError(friendlyError(err.code));
        }
      });

      // ── Enter key support ──
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const loginForm  = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");
        if (loginForm  && loginForm.style.display  !== "none") document.getElementById("loginBtn").click();
        if (signupForm && signupForm.style.display !== "none") document.getElementById("signupBtn").click();
      });

    });
  </script>

  <style>
    #auth {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 16px;
    }

    #auth > h2 {
      color: #fff;
      font-size: 1.8rem;
      margin: 0;
    }

    #auth > p {
      color: #9aa4b2;
      margin: 0;
      font-size: 1rem;
    }

    .auth-box {
      background: #1f2937;
      padding: 36px 30px;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      width: 340px;
      color: #e6eef8;
    }

    .tabs {
      display: flex;
      margin-bottom: 20px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #374151;
    }

    .tabs button {
      flex: 1;
      padding: 10px;
      border: none;
      background: #111827;
      color: #9aa4b2;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tabs button.active {
      background: #F59E0B;
      color: #111827;
      font-weight: bold;
    }

    #formContainer input {
      width: 100%;
      padding: 10px 12px;
      margin: 7px 0;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #111827;
      color: #e6eef8;
      font-size: 14px;
      box-sizing: border-box;
    }

    #formContainer input:focus {
      outline: none;
      border-color: #F59E0B;
    }

    #formContainer input::placeholder {
      color: #6b7280;
    }

    #formContainer button.main-btn,
    #formContainer button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 15px;
      border: none;
      border-radius: 9px;
      background: linear-gradient(135deg, #F59E0B, #D97706) !important;
      color: #07090f !important;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(245,158,11,0.3);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.2px;
    }

    #formContainer button.main-btn:hover,
    #formContainer button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,158,11,0.45);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      color: #6b7280;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #374151;
    }

    .google-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid #374151;
      border-radius: 8px;
      background: #111827;
      color: #e6eef8;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s;
      box-sizing: border-box;
    }

    .google-btn:hover {
      background: #1f2937;
      border-color: #F59E0B;
    }

    #authError {
      display: none;
      background: #7f1d1d;
      color: #fca5a5;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>

<body class="home">

  <section id="auth">
    <h2>🚀 CareerBoost</h2>
    <p>Empowering Students with Opportunities</p>

    <div class="auth-box">

      <!-- Tabs -->
      <div class="tabs">
        <button id="loginTab" class="active" onclick="switchTab('login')">Login</button>
        <button id="signupTab" onclick="switchTab('signup')">Signup</button>
      </div>

      <!-- Forms -->
      <div id="formContainer">

        <!-- Login Form -->
        <div id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email" />
          <input type="password" id="loginPassword" placeholder="Password" />
          <button class="main-btn" id="loginBtn" data-label="Login">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" style="display:none;">
          <input type="text" id="signupName" placeholder="Full Name" />
          <input type="email" id="signupEmail" placeholder="Email" />
          <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" />
          <button class="main-btn" id="signupBtn" data-label="Create Account">Create Account</button>
        </div>

      </div>

      <!-- Divider -->
      <div class="divider">or</div>

      <!-- Google Button -->
      <button class="google-btn" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.1-6.1C34.46 3.19 29.53 1 24 1 14.82 1 7.07 6.49 3.58 14.24l7.14 5.55C12.43 13.49 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.22-.42-4.74H24v9h12.42c-.54 2.9-2.18 5.36-4.64 7.01l7.14 5.55C43.08 37.45 46.1 31.4 46.1 24.5z"/>
          <path fill="#FBBC05" d="M10.72 28.21A14.5 14.5 0 0 1 9.5 24c0-1.46.25-2.87.72-4.21L3.08 14.24A23.94 23.94 0 0 0 0 24c0 3.86.92 7.5 2.58 10.72l8.14-6.51z"/>
          <path fill="#34A853" d="M24 47c5.53 0 10.17-1.83 13.56-4.97l-7.14-5.55C28.61 38.1 26.42 39 24 39c-6.26 0-11.57-3.99-13.28-9.79l-7.14 5.55C7.07 42.51 14.82 47 24 47z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Error Box -->
      <div id="authError"></div>

    </div>
  </section>

  <!-- Tab switching logic -->
  <script>
    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const loginTab = document.getElementById('loginTab');
      const signupTab = document.getElementById('signupTab');
      document.getElementById('authError').style.display = 'none';

      if (tab === 'login') {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        signupTab.classList.add('active');
        loginTab.classList.remove('active');
      }
    }
  </script>

  <!-- script.js handles chat, mentor, call features — completely untouched -->
  <script src="script.js"></script>

</body>
</html>
